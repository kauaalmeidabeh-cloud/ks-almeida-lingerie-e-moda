<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KS Lingerie</title>

<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background:#000;
  color:#fff;
}

/* ===== HEADER ===== */
header{
  position:fixed;
  top:0;
  width:100%;
  background:#000;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 30px;
  z-index:1000;
}

.logo{
  font-size:18px;
  font-weight:bold;
}

.menu a{
  color:#fff;
  margin-left:20px;
  text-decoration:none;
}

/* ===== BANNER ===== */
.banner{
  height:100vh;
  background:url('https://images.unsplash.com/photo-1581044777550-4cfa60707c03') center/cover no-repeat;
  display:flex;
  align-items:center;
}

.banner::after{
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
}

.conteudo{
  position:relative;
  padding-left:60px;
  max-width:400px;
}

/* TEXTO AJUSTADO (nem pequeno nem grande) */
.conteudo h1{
  font-size:34px;
  margin-bottom:10px;
}

.conteudo p{
  font-size:18px;
  margin-bottom:20px;
}

/* BOTÃO AJUSTADO */
.botao{
  background:#ff2e7a;
  padding:12px 22px;
  border-radius:8px;
  text-decoration:none;
  color:#fff;
  font-size:15px;
  display:inline-block;
}

/* ===== PRODUTOS ===== */
.produtos{
  padding:40px 20px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:20px;
}

.produto{
  background:#111;
  padding:10px;
  border-radius:10px;
  text-align:center;
}

.produto img{
  width:100%;
  border-radius:10px;
}

.produto h3{
  font-size:16px;
}

.produto p{
  color:#ff2e7a;
}

/* ===== MOBILE ===== */
@media(max-width:768px){

  .conteudo{
    padding-left:25px;
  }

  .conteudo h1{
    font-size:26px;
  }

  .conteudo p{
    font-size:15px;
  }

  .grid{
    grid-template-columns:1fr;
  }

}
</style>
</head>

<body>

<header>
  <div class="logo">KS Lingerie</div>

  <div class="menu">
    <a href="#">Produtos</a>
    <a href="#">Promoções</a>
  </div>
</header>

<section class="banner">
  <div class="conteudo">
    <h1>Elegância que você veste</h1>
    <p>Lingerie que valoriza você</p>
    <a href="#" class="botao">Ver Coleção</a>
  </div>
</section>

<section class="produtos">
  <h2>Mais Vendidos</h2>

  <div class="grid">

    <div class="produto">
      <img src="https://images.unsplash.com/photo-1600185365483-26d7a4cc7519">
      <h3>Conjunto Luxo</h3>
      <p>R$ 59,90</p>
    </div>

    <div class="produto">
      <img src="https://images.unsplash.com/photo-1618354691373-d851c5c3a990">
      <h3>Body Renda</h3>
      <p>R$ 69,90</p>
    </div>

  </div>
</section>

</body>
</html>
