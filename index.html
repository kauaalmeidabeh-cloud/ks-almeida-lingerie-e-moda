<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elegance Lingerie</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #000;
  color: #fff;
}

/* ===== BANNER ===== */
.banner {
  background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.8)),
  url('https://images.unsplash.com/photo-1581044777550-4cfa60707c03');
  background-size: cover;
  background-position: center;
  height: 90vh;
  display: flex;
  align-items: center;
}

.texto-banner {
  padding-left: 30px;
  max-width: 400px;
}

.texto-banner h1 {
  font-size: 38px;
  margin-bottom: 10px;
}

.texto-banner p {
  font-size: 18px;
  margin-bottom: 20px;
}

.botao {
  background: #ff4d88;
  color: #fff;
  padding: 12px 20px;
  text-decoration: none;
  border-radius: 8px;
}

/* ===== PRODUTOS ===== */
.produtos {
  padding: 20px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 15px;
}

.produto {
  background: #111;
  padding: 10px;
  border-radius: 10px;
  text-align: center;
}

.produto img {
  width: 100%;
  border-radius: 10px;
}

.produto h3 {
  margin: 10px 0 5px;
}

.produto p {
  color: #ff4d88;
}

/* ===== WHATSAPP ===== */
.whatsapp {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #25d366;
  color: #fff;
  padding: 15px;
  border-radius: 50%;
  text-decoration: none;
  font-size: 20px;
}

/* ===== MOBILE ===== */
@media (max-width: 768px) {
  .texto-banner h1 {
    font-size: 28px;
  }

  .grid {
    grid-template-columns: 1fr;
  }
}
</style>
</head>

<body>

<!-- BANNER -->
<section class="banner">
  <div class="texto-banner">
    <h1>Elegância que você veste</h1>
    <p>Lingerie que valoriza você</p>
    <a href="#" class="botao">Ver Coleção</a>
  </div>
</section>

<!-- PRODUTOS -->
<section class="produtos">
  <h2>Mais Vendidos</h2>

  <div class="grid">

    <div class="produto">
      <img src="https://images.unsplash.com/photo-1600185365483-26d7a4cc7519">
      <h3>Conjunto Luxo</h3>
      <p>R$ 59,90</p>
    </div>

    <div class="produto">
      <img src="https://images.unsplash.com/photo-1618354691373-d851c5c3a990">
      <h3>Renda Premium</h3>
      <p>R$ 69,90</p>
    </div>

  </div>
</section>

<!-- WHATSAPP -->
<a href="https://wa.me/5511982311608" class="whatsapp">💬</a>

</body>
</html>
